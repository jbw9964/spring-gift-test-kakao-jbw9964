name: cucumber-test-compose

services:
  postgresql:
    container_name: postgresql
    image: postgres:alpine

    env_file: cucumber-test.env

    ports:
      - "2345:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
