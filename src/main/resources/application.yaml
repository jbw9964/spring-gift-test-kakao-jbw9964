spring:
  application:
    name: gift

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        globally_quoted_identifiers: true

  profiles:
    default: local

kakao:
  message:
    token: ACCESS_TOKEN
    url: https://kapi.kakao.com/v1/api/talk

  social:
    token: ACCESS_TOKEN
    url: https://kapi.kakao.com/v1/api/talk
