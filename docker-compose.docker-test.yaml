name: docker-test-compose

services:
  postgresql:
    container_name: postgresql
    image: postgres:alpine

    env_file: docker.env

    ports:
      - "2345:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  application:
    container_name: application
    build:
      context: ./
      dockerfile: application.dockerfile

    depends_on:
      postgresql:
        condition: service_healthy

    env_file: docker.env

    ports:
      - "28080:8080"
